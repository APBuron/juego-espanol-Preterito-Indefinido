<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pretérito Indefinido — Juego de Clase</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  #game { width: 100%; max-width: 700px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .title { font-size: 15px; color: #aaa; letter-spacing: 0.05em; text-transform: uppercase; }
  .score-box { font-size: 14px; color: #aaa; }
  .score-box span { font-weight: 600; color: #fff; }
  .q-label { text-align: center; font-size: 13px; color: #888; margin-bottom: 16px; }
  .verb-card { background: #16213e; border: 1px solid #0f3460; border-radius: 16px; padding: 40px 24px; text-align: center; margin-bottom: 20px; }
  .badge { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
  .badge-r { background: #1a3a1a; color: #5cb85c; }
  .badge-i { background: #3a1a1a; color: #e07070; }
  .verb-name { font-size: 48px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .pronoun { font-size: 24px; color: #7eb8f7; font-weight: 500; }
  .timer-bar { height: 6px; background: #0f3460; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
  .timer-fill { height: 100%; border-radius: 3px; transition: width 0.08s linear; }
  .t-ok { background: #4a9eff; }
  .t-warn { background: #f0a500; }
  .t-danger { background: #e74c3c; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .opt { padding: 18px 12px; border: 1px solid #0f3460; border-radius: 12px; background: #16213e; color: #fff; font-size: 20px; font-weight: 600; cursor: pointer; transition: background 0.12s, border-color 0.12s; }
  .opt:hover:not(:disabled) { background: #0f3460; border-color: #4a9eff; }
  .opt.correct { background: #1a3a1a; border-color: #5cb85c; color: #5cb85c; }
  .opt.wrong { background: #3a1a1a; border-color: #e74c3c; color: #e74c3c; }
  .opt:disabled { cursor: default; }
  .msg { text-align: center; font-size: 15px; min-height: 24px; margin-bottom: 16px; }
  .msg.ok { color: #5cb85c; }
  .msg.ko { color: #e74c3c; }
  .controls { display: flex; justify-content: center; gap: 12px; }
  .next-btn { padding: 12px 36px; border: 1px solid #0f3460; border-radius: 10px; background: #16213e; color: #fff; font-size: 15px; cursor: pointer; transition: background 0.12s; }
  .next-btn:hover { background: #0f3460; }
  .settings { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 14px; border: 1px solid #0f3460; border-radius: 20px; background: #16213e; color: #888; font-size: 12px; cursor: pointer; transition: all 0.12s; }
  .filter-btn.active { background: #0f3460; color: #fff; border-color: #4a9eff; }
  .end { text-align: center; padding: 3rem 1rem; }
  .end-score { font-size: 72px; font-weight: 700; color: #fff; }
  .end-sub { font-size: 16px; color: #aaa; margin-top: 6px; }
  .end-msg { font-size: 18px; color: #7eb8f7; margin-top: 12px; }
  .restart { margin-top: 24px; padding: 12px 36px; border: 1px solid #0f3460; border-radius: 10px; background: #16213e; color: #fff; font-size: 15px; cursor: pointer; }
  .restart:hover { background: #0f3460; }
  .pending-note { font-size: 12px; color: #f0a500; text-align: center; margin-bottom: 8px; min-height: 18px; }
</style>
</head>
<body>
<div id="game">
  <div id="main-game">
    <div class="header">
      <div class="title">Pretérito Indefinido</div>
      <div class="score-box">✓ <span id="sc">0</span> / <span id="tot">0</span></div>
    </div>
    <div class="settings">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">todos</button>
      <button class="filter-btn" id="f-reg" onclick="setFilter('regular')">solo regulares</button>
      <button class="filter-btn" id="f-irr" onclick="setFilter('irregular')">solo irregulares</button>
    </div>
    <div class="q-label" id="qlabel">pregunta 1 / 25</div>
    <div class="pending-note" id="pending-note"></div>
    <div class="verb-card">
      <div class="badge" id="badge">regular</div>
      <div class="verb-name" id="vname">—</div>
      <div class="pronoun" id="pron">—</div>
    </div>
    <div class="timer-bar"><div class="timer-fill t-ok" id="tfill" style="width:100%"></div></div>
    <div class="options" id="opts"></div>
    <div class="msg" id="msg"></div>
    <div class="controls"><button class="next-btn" id="nxtbtn" style="display:none" onclick="nextQ()">siguiente →</button></div>
  </div>
  <div id="endscreen" style="display:none" class="end">
    <div class="end-score" id="escore">0/25</div>
    <div class="end-sub">aciertos</div>
    <div class="end-msg" id="endmsg"></div>
    <button class="restart" onclick="startGame()">jugar otra vez</button>
  </div>
</div>

<script>
// f: [yo, tú, él/ella, nosotros, ellos/ellas]
// x: distractores de otros tiempos del mismo verbo
const VD=[
  {v:'hablar',t:'regular',
   f:['hablé','hablaste','habló','hablamos','hablaron'],
   x:['hablaba','hablabas','hablaban','hablaría','habla','hablas','hablan']},
  {v:'comer',t:'regular',
   f:['comí','comiste','comió','comimos','comieron'],
   x:['comía','comías','comían','comería','come','comes','comen']},
  {v:'vivir',t:'regular',
   f:['viví','viviste','vivió','vivimos','vivieron'],
   x:['vivía','vivías','vivían','viviría','vive','vives','viven']},
  {v:'trabajar',t:'regular',
   f:['trabajé','trabajaste','trabajó','trabajamos','trabajaron'],
   x:['trabajaba','trabajabas','trabajaban','trabajaría','trabaja','trabajas','trabajan']},
  {v:'beber',t:'regular',
   f:['bebí','bebiste','bebió','bebimos','bebieron'],
   x:['bebía','bebías','bebían','bebería','bebe','bebes','beben']},
  {v:'escribir',t:'regular',
   f:['escribí','escribiste','escribió','escribimos','escribieron'],
   x:['escribía','escribías','escribían','escribiría','escribe','escribes','escriben']},
  {v:'llegar',t:'regular',
   f:['llegué','llegaste','llegó','llegamos','llegaron'],
   x:['llegaba','llegabas','llegaban','llegaría','llega','llegas','llegan']},
  {v:'comprar',t:'regular',
   f:['compré','compraste','compró','compramos','compraron'],
   x:['compraba','comprabas','compraban','compraría','compra','compras','compran']},
  {v:'salir',t:'regular',
   f:['salí','saliste','salió','salimos','salieron'],
   x:['salía','salías','salían','saldría','sale','sales','salen']},
  {v:'abrir',t:'regular',
   f:['abrí','abriste','abrió','abrimos','abrieron'],
   x:['abría','abrías','abrían','abriría','abre','abres','abren']},
  {v:'ser / ir',t:'irregular',
   f:['fui','fuiste','fue','fuimos','fueron'],
   x:['era','eras','éramos','eran','sería','iría','es','son','va','van','iba','ibas']},
  {v:'tener',t:'irregular',
   f:['tuve','tuviste','tuvo','tuvimos','tuvieron'],
   x:['tenía','tenías','teníamos','tenían','tendría','tiene','tienes','tienen']},
  {v:'estar',t:'irregular',
   f:['estuve','estuviste','estuvo','estuvimos','estuvieron'],
   x:['estaba','estabas','estábamos','estaban','estaría','está','estás','están']},
  {v:'hacer',t:'irregular',
   f:['hice','hiciste','hizo','hicimos','hicieron'],
   x:['hacía','hacías','hacíamos','hacían','haría','hace','haces','hacen']},
  {v:'poder',t:'irregular',
   f:['pude','pudiste','pudo','pudimos','pudieron'],
   x:['podía','podías','podíamos','podían','podría','puede','puedes','pueden']},
  {v:'querer',t:'irregular',
   f:['quise','quisiste','quiso','quisimos','quisieron'],
   x:['quería','querías','queríamos','querían','querría','quiere','quieres','quieren']},
  {v:'venir',t:'irregular',
   f:['vine','viniste','vino','vinimos','vinieron'],
   x:['venía','venías','veníamos','venían','vendría','viene','vienes','vienen']},
  {v:'decir',t:'irregular',
   f:['dije','dijiste','dijo','dijimos','dijeron'],
   x:['decía','decías','decíamos','decían','diría','dice','dices','dicen']},
  {v:'dar',t:'irregular',
   f:['di','diste','dio','dimos','dieron'],
   x:['daba','dabas','dábamos','daban','daría','da','das','dan']},
  {v:'saber',t:'irregular',
   f:['supe','supiste','supo','supimos','supieron'],
   x:['sabía','sabías','sabíamos','sabían','sabría','sabe','sabes','saben']},
  {v:'poner',t:'irregular',
   f:['puse','pusiste','puso','pusimos','pusieron'],
   x:['ponía','ponías','poníamos','ponían','pondría','pone','pones','ponen']},
  {v:'pedir',t:'irregular',
   f:['pedí','pediste','pidió','pedimos','pidieron'],
   x:['pedía','pedías','pedíamos','pedían','pediría','pide','pides','piden']},
  {v:'dormir',t:'irregular',
   f:['dormí','dormiste','durmió','dormimos','durmieron'],
   x:['dormía','dormías','dormíamos','dormían','dormiría','duerme','duermes','duermen']},
  {v:'sentir',t:'irregular',
   f:['sentí','sentiste','sintió','sentimos','sintieron'],
   x:['sentía','sentías','sentíamos','sentían','sentiría','siente','sientes','sienten']},
  {v:'seguir',t:'irregular',
   f:['seguí','seguiste','siguió','seguimos','siguieron'],
   x:['seguía','seguías','seguíamos','seguían','seguiría','sigue','sigues','siguen']},
];
const PR=['yo','tú','él/ella','nosotros','ellos/ellas'];
const TOTAL=25;
let queue=[],pending=[],cur=0,sc=0,answered=false,tim=null,filter='all',doingPending=false;

function setFilter(f){
  filter=f;
  ['all','reg','irr'].forEach(x=>{
    document.getElementById('f-'+x).classList.toggle('active',
      (x==='all'&&f==='all')||(x==='reg'&&f==='regular')||(x==='irr'&&f==='irregular'));
  });
  startGame();
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function genQuestions(){
  const src=filter==='all'?VD:VD.filter(v=>v.t===filter);
  const pool=[];
  src.forEach(v=>{PR.forEach((_,pi)=>{pool.push({vi:VD.indexOf(v),pi})})});
  return shuffle(pool).slice(0,TOTAL);
}

function getWrongs(correct,vi,pi){
  const seen=new Set([correct]);
  const res=[];
  // primero otras personas del mismo verbo en indefinido, luego otros tiempos
  const sameVerb=VD[vi].f.filter((_,i)=>i!==pi);
  const extras=VD[vi].x||[];
  for(const f of shuffle([...sameVerb,...extras])){
    if(!seen.has(f)){seen.add(f);res.push(f);}
    if(res.length===3)break;
  }
  return res;
}

function startGame(){
  queue=genQuestions();pending=[];cur=0;sc=0;answered=false;doingPending=false;
  document.getElementById('main-game').style.display='';
  document.getElementById('endscreen').style.display='none';
  document.getElementById('sc').textContent='0';
  document.getElementById('tot').textContent='0';
  document.getElementById('pending-note').textContent='';
  showQ();
}

function currentItem(){ return doingPending?pending[cur]:queue[cur]; }
function totalItems(){ return doingPending?pending.length:TOTAL; }

function showQ(){
  answered=false;clearInterval(tim);
  const q=currentItem();
  const verb=VD[q.vi];const pron=PR[q.pi];const correct=verb.f[q.pi];
  document.getElementById('qlabel').textContent=`pregunta ${cur+1} / ${totalItems()}`;
  document.getElementById('vname').textContent=verb.v;
  document.getElementById('pron').textContent=pron;
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='msg';
  document.getElementById('nxtbtn').style.display='none';
  if(doingPending) document.getElementById('pending-note').textContent=`🔄 Repasando ${pending.length} pregunta${pending.length>1?'s':''} sin responder`;
  else document.getElementById('pending-note').textContent='';
  const badge=document.getElementById('badge');
  badge.className='badge '+(verb.t==='irregular'?'badge-i':'badge-r');
  badge.textContent=verb.t;
  const wrongs=getWrongs(correct,q.vi,q.pi);
  const opts=shuffle([correct,...wrongs]);
  const grid=document.getElementById('opts');
  grid.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='opt';btn.textContent=o;
    btn.onclick=()=>handleAns(btn,o,correct,grid);
    grid.appendChild(btn);
  });
  startTimer(correct,grid);
}

function startTimer(correct,grid){
  const fill=document.getElementById('tfill');
  fill.style.width='100%';fill.className='timer-fill t-ok';
  const start=Date.now();
  tim=setInterval(()=>{
    const el=(Date.now()-start)/1000;
    const pct=Math.max(0,1-el/5);
    fill.style.width=(pct*100)+'%';
    fill.className='timer-fill '+(pct<0.33?'t-danger':pct<0.66?'t-warn':'t-ok');
    if(el>=5&&!answered){clearInterval(tim);timeUp(correct,grid);}
  },60);
}

function timeUp(correct,grid){
  answered=true;
  Array.from(grid.children).forEach(b=>{b.disabled=true;if(b.textContent===correct)b.className='opt correct';});
  const msg=document.getElementById('msg');
  msg.textContent=`⏱ tiempo — respuesta: ${correct}`;msg.className='msg ko';
  document.getElementById('tot').textContent=doingPending?'-':cur+1;
  if(!doingPending)pending.push(currentItem());
  document.getElementById('nxtbtn').style.display='';
}

function handleAns(btn,sel,correct,grid){
  if(answered)return;answered=true;clearInterval(tim);
  Array.from(grid.children).forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.className='opt correct';
    else if(b===btn&&sel!==correct)b.className='opt wrong';
  });
  const msg=document.getElementById('msg');
  if(sel===correct){sc++;msg.textContent='✓ correcto';msg.className='msg ok';document.getElementById('sc').textContent=sc;}
  else{msg.textContent=`✗ era: ${correct}`;msg.className='msg ko';if(!doingPending)pending.push(currentItem());}
  document.getElementById('tot').textContent=doingPending?'-':cur+1;
  document.getElementById('nxtbtn').style.display='';
}

function nextQ(){
  cur++;
  if(cur>=totalItems()){
    if(!doingPending&&pending.length>0){doingPending=true;cur=0;showQ();}
    else{
      clearInterval(tim);
      document.getElementById('main-game').style.display='none';
      document.getElementById('endscreen').style.display='';
      document.getElementById('escore').textContent=sc+'/'+TOTAL;
      const pct=Math.round(sc/TOTAL*100);
      document.getElementById('endmsg').textContent=pct>=80?'¡Muy bien, Ofira! 🎉':pct>=60?'Buen trabajo, a seguir practicando.':'Hay que repasar un poco más.';
    }
  }else{showQ();}
}

startGame();
</script>
</body>
</html>
